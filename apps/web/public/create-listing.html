<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Listing — MultiPortal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
    header { background: #1a1a2e; color: white; padding: 1.5rem; text-align: center; }
    header a { color: #e94560; text-decoration: none; }
    main { max-width: 650px; margin: 2rem auto; padding: 0 1rem; }
    .form-card { background: white; border-radius: 12px; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .form-card h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #1a1a2e; }
    label { display: block; margin-bottom: 0.3rem; font-weight: 600; font-size: 0.9rem; }
    input, textarea, select { width: 100%; padding: 10px; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
    textarea { resize: vertical; min-height: 100px; }
    button { width: 100%; padding: 14px; background: #e94560; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; }
    button:hover { background: #c23152; }
    button:disabled { background: #999; cursor: not-allowed; }
    .result { margin-top: 1rem; padding: 1rem; border-radius: 8px; display: none; }
    .result.success { display: block; background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .result.error { display: block; background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    footer { text-align: center; padding: 2rem; color: #999; font-size: 0.9rem; }
  </style>
</head>
<body>
  <header>
    <a href="/">← Back to Dashboard</a>
    <h1>MultiPortal Listing Manager</h1>
  </header>

  <main>
    <div class="form-card">
      <h1>📝 Create Listing Draft</h1>
      <form id="listingForm">
        <label>Title *</label>
        <input type="text" id="title" required placeholder="e.g., iPhone 15 Pro 256GB">

        <label>Description *</label>
        <textarea id="description" required placeholder="Describe your item in detail..."></textarea>

        <label>Price (PLN) *</label>
        <input type="number" id="price" min="0" step="0.01" required placeholder="0.00">

        <label>Category *</label>
        <input type="text" id="category" required placeholder="e.g., Electronics">

        <label>Workspace</label>
        <input type="text" id="workspaceId" value="workspace-1" readonly>

        <button type="submit" id="submitBtn">Create Draft</button>
      </form>

      <div id="result" class="result"></div>
    </div>
  </main>

  <footer>
    <p>MultiPortal Listing Manager v0.0.0 — Development Mode</p>
  </footer>

  <script>
    document.getElementById('listingForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const result = document.getElementById('result');

      btn.disabled = true;
      btn.textContent = 'Creating...';
      result.className = 'result';
      result.style.display = 'none';

      const data = {
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        price: Number(document.getElementById('price').value),
        category: document.getElementById('category').value,
        workspaceId: document.getElementById('workspaceId').value,
      };

      try {
        const res = await fetch('http://localhost:3001/listings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || err.message || 'Request failed');
        }

        const listing = await res.json();
        result.className = 'result success';
        result.innerHTML = `✅ <strong>Listing created!</strong><br>ID: ${listing.id}<br>Status: ${listing.status}<br><br><a href="/">Return to dashboard</a>`;
      } catch (error) {
        result.className = 'result error';
        result.innerHTML = `❌ <strong>Error:</strong> ${error.message}`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Draft';
      }
    });
  </script>
</body>
</html>
