<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Listing — MultiPortal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 100vh; color: #fff; }
    .container { max-width: 650px; margin: 0 auto; padding: 2rem; }
    header { text-align: center; padding: 2rem 0; }
    header h1 { font-size: 1.8rem; background: linear-gradient(90deg, #e94560, #f39c12); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    header a { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.9rem; }
    .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 2.5rem; }
    .card h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #e94560; text-align: left; background: none; -webkit-text-fill-color: #e94560; }
    label { display: block; margin-bottom: 0.3rem; font-weight: 600; font-size: 0.85rem; color: rgba(255,255,255,0.8); }
    input, textarea { width: 100%; padding: 12px; margin-bottom: 1rem; border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; background: rgba(255,255,255,0.08); color: #fff; font-size: 1rem; }
    input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.35); }
    textarea { resize: vertical; min-height: 120px; }
    button { width: 100%; padding: 14px; background: linear-gradient(90deg, #e94560, #c23152); color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: transform 0.1s; }
    button:hover { transform: scale(1.02); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 0.5rem; }
    .toast { padding: 1rem 1.5rem; border-radius: 10px; color: #fff; font-weight: 600; font-size: 0.9rem; animation: slideIn 0.3s ease; max-width: 400px; }
    .toast.success { background: rgba(34,197,94,0.9); }
    .toast.error { background: rgba(220,38,38,0.9); }
    .toast.warning { background: rgba(245,158,11,0.9); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    footer { text-align: center; padding: 2rem; color: rgba(255,255,255,0.3); font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="toast-container" id="toastContainer"></div>
  <div class="container">
    <header>
      <a href="/">← Back to Dashboard</a>
      <h1>MultiPortal Listing Manager</h1>
    </header>

    <div class="card">
      <h1>📝 Create Listing Draft</h1>
      <form id="listingForm">
        <label>Title *</label>
        <input type="text" id="title" required placeholder="e.g., iPhone 15 Pro 256GB" maxlength="500">

        <label>Description *</label>
        <textarea id="description" required placeholder="Describe your item in detail... (max 10,000 chars)" maxlength="10000"></textarea>

        <label>Price (PLN) *</label>
        <input type="number" id="price" min="0" step="0.01" required placeholder="0.00">

        <label>Category *</label>
        <input type="text" id="category" required placeholder="e.g., Electronics" maxlength="200">

        <label>Photos (up to 20)</label>
        <input type="file" id="photos" accept="image/*" multiple style="padding:8px">
        <div id="photoPreview" style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem"></div>

        <button type="submit" id="submitBtn">Create Draft</button>
      </form>
    </div>
  </div>
  <footer>MultiPortal Listing Manager v__APP_VERSION__ · Development Mode</footer>

  <script>
    const API = '';
    const COOKIE_SESSION_MARKER = 'cookie-session';
    const ALLOWED_IMAGE_MIME_TYPES = new Set(['image/jpeg', 'image/png', 'image/gif', 'image/webp']);
    const MAX_IMAGE_FILE_SIZE_BYTES = 10 * 1024 * 1024;
    const MAX_IMAGE_FILE_SIZE_MB = Math.round(MAX_IMAGE_FILE_SIZE_BYTES / (1024 * 1024));
    let token = localStorage.getItem('token') || '';
    let csrfToken = '';

    function getAuthHeaders(extraHeaders = {}) {
      const jwtLike = /^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+$/.test(token);
      return jwtLike ? { ...extraHeaders, Authorization: 'Bearer ' + token } : extraHeaders;
    }

    async function ensureCsrfToken(forceRefresh = false) {
      if (csrfToken && !forceRefresh) return csrfToken;
      const res = await fetch(API + '/auth/csrf', { cache: 'no-store' });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.csrfToken) {
        throw new Error(data.error || 'Failed to initialize the security token. Refresh the page and try again.');
      }
      csrfToken = data.csrfToken;
      return csrfToken;
    }

    async function apiFetch(path, options = {}, { auth = false } = {}) {
      const method = String(options.method || 'GET').toUpperCase();
      let headers = { ...(options.headers || {}) };

      if (!['GET', 'HEAD', 'OPTIONS'].includes(method)) {
        const tokenValue = await ensureCsrfToken();
        headers['X-CSRF-Token'] = tokenValue;
      }

      if (auth) {
        headers = getAuthHeaders(headers);
      }

      return fetch(API + path, { ...options, headers });
    }

    function toast(msg, type) {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = 'toast ' + type;
      t.textContent = msg;
      c.appendChild(t);
      setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 4000);
    }

    // Check auth on page load
    (async () => {
      try {
        const res = await fetch(API + '/auth/me');
        if (!res.ok) throw new Error('Not authenticated');
        const data = await res.json();
        token = token || COOKIE_SESSION_MARKER;
        localStorage.setItem('token', COOKIE_SESSION_MARKER);
        localStorage.setItem('user', JSON.stringify(data.user));
        await ensureCsrfToken();
      } catch {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        toast('Please log in first. Redirecting...', 'warning');
        setTimeout(() => { window.location.href = '/'; }, 1500);
      }
    })();

    async function validateImageFile(file) {
      if (!(file instanceof File)) {
        throw new Error('Invalid file.');
      }
      if (!ALLOWED_IMAGE_MIME_TYPES.has(file.type)) {
        throw new Error('Only JPG, PNG, GIF, or WebP images are allowed.');
      }
      if (file.size < 1) {
        throw new Error('The selected image file is empty.');
      }
      if (file.size > MAX_IMAGE_FILE_SIZE_BYTES) {
        throw new Error(`Image is too large. Maximum size is ${MAX_IMAGE_FILE_SIZE_MB} MB.`);
      }

      const objectUrl = URL.createObjectURL(file);
      try {
        await new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => {
            if (!img.naturalWidth || !img.naturalHeight) {
              reject(new Error('The image is corrupted or has invalid dimensions.'));
              return;
            }
            resolve();
          };
          img.onerror = () => reject(new Error('This file is not a valid image or is corrupted.'));
          img.src = objectUrl;
        });
      } finally {
        URL.revokeObjectURL(objectUrl);
      }
    }

    function replaceFileInputFiles(input, files) {
      const dataTransfer = new DataTransfer();
      files.forEach((file) => dataTransfer.items.add(file));
      input.files = dataTransfer.files;
    }

    async function sanitizeSelectedImages(input) {
      const validFiles = [];
      const rejectedMessages = [];

      for (const file of Array.from(input.files || [])) {
        try {
          await validateImageFile(file);
          validFiles.push(file);
        } catch (error) {
          rejectedMessages.push(`${file.name}: ${error.message}`);
        }
      }

      replaceFileInputFiles(input, validFiles);
      return { validFiles, rejectedMessages };
    }

    // Photo preview on file select
    document.getElementById('photos').addEventListener('change', async function() {
      const preview = document.getElementById('photoPreview');
      preview.innerHTML = '';
      const { validFiles, rejectedMessages } = await sanitizeSelectedImages(this);
      rejectedMessages.forEach((message) => toast(message, 'error'));
      for (const file of validFiles) {
        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        img.style.cssText = 'width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid rgba(255,255,255,0.2)';
        preview.appendChild(img);
      }
    });

    // Read file as base64
    function readFileAsBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]); // strip data:... prefix
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // Upload a file via server-side endpoint (base64 encoded)
    async function uploadPhoto(file, listingId) {
      await validateImageFile(file);
      const data = await readFileAsBase64(file);
      const body = { fileName: file.name, contentType: file.type, fileSize: file.size, data };
      if (listingId) body.listingId = listingId;

      const res = await apiFetch('/media/upload', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      }, { auth: true });
      if (!res.ok) {
        const errorData = await res.json().catch(() => ({}));
        throw new Error(errorData.error || 'Failed to upload file');
      }
      const { publicUrl } = await res.json();
      return publicUrl;
    }

    document.getElementById('listingForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');

      if (!localStorage.getItem('token')) {
        window.location.href = '/';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating draft...';

      const data = {
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        price: Number(document.getElementById('price').value),
        category: document.getElementById('category').value,
      };

      try {
        // 1. Create the draft first
        const res = await apiFetch('/listings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        }, { auth: true });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || 'Failed to create listing');
        }

        const listing = await res.json();
        const listingId = listing.listing?.id || listing.id;

        // 2. Upload photos and attach to the draft
        const photoFiles = document.getElementById('photos').files;
        const photoUrls = [];
        if (photoFiles.length > 0) {
          btn.textContent = 'Uploading photos...';
          for (const file of photoFiles) {
            const url = await uploadPhoto(file, listingId);
            photoUrls.push(url);
            toast('📷 Uploaded: ' + file.name, 'success');
          }

          // 3. Append photo URLs to the draft
          if (photoUrls.length > 0) {
            await apiFetch('/listings/' + listingId + '/photos', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ urls: photoUrls }),
            }, { auth: true });
          }
        }

        toast('✅ Listing created with ' + photoUrls.length + ' photos!', 'success');
        setTimeout(() => { window.location.href = '/'; }, 1500);
      } catch (error) {
        toast('❌ ' + error.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Create Draft';
      }
    });
  </script>
</body>
</html>
