<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — MultiPortal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: white; border-radius: 12px; padding: 2rem; width: 100%; max-width: 420px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .card h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #1a1a2e; }
    .card p { color: #666; margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.3rem; font-weight: 600; font-size: 0.9rem; }
    input { width: 100%; padding: 10px; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
    button { width: 100%; padding: 14px; background: #e94560; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; }
    button:hover { background: #c23152; }
    button:disabled { background: #999; cursor: not-allowed; }
    .result { margin-top: 1rem; padding: 1rem; border-radius: 8px; display: none; }
    .result.error { display: block; background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .links { text-align: center; margin-top: 1rem; }
    .links a { color: #e94560; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Log In</h1>
    <p>Sign in to your MultiPortal account</p>
    <form id="loginForm">
      <label>Email</label>
      <input type="email" id="email" required placeholder="you@example.com" autocomplete="email">
      <label>Password</label>
      <input type="password" id="password" required placeholder="Your password" autocomplete="current-password">
      <button type="submit" id="submitBtn">Log In</button>
    </form>
    <div id="result" class="result"></div>
    <div class="links">
      Don't have an account? <a href="/register">Sign up</a>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const result = document.getElementById('result');
      btn.disabled = true;
      btn.textContent = 'Logging in...';
      result.className = 'result';
      result.style.display = 'none';

      try {
        const res = await fetch('http://localhost:3001/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
          }),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify({ id: data.userId, name: data.name, email: data.email }));
        window.location.href = '/';
      } catch (error) {
        result.className = 'result error';
        result.textContent = error.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Log In';
      }
    });
  </script>
</body>
</html>
