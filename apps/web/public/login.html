<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — MultiPortal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: white; border-radius: 12px; padding: 2rem; width: 100%; max-width: 420px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .card h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #1a1a2e; }
    .card p { color: #666; margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.3rem; font-weight: 600; font-size: 0.9rem; }
    input { width: 100%; padding: 10px; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
    button { width: 100%; padding: 14px; background: #e94560; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; }
    button:hover { background: #c23152; }
    button:disabled { background: #999; cursor: not-allowed; }
    .result { margin-top: 1rem; padding: 1rem; border-radius: 8px; display: none; }
    .result.error { display: block; background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .links { text-align: center; margin-top: 1rem; }
    .links a { color: #e94560; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Log In</h1>
    <p>Sign in to your MultiPortal account</p>
    <form id="loginForm">
      <label>Email</label>
      <input type="email" id="email" required placeholder="you@example.com" autocomplete="email">
      <label>Password</label>
      <input type="password" id="password" required placeholder="Your password" autocomplete="current-password">
      <button type="submit" id="submitBtn">Log In</button>
      <p id="attemptsHint" style="display:none;margin-top:0.85rem;font-size:0.8rem;color:#8a6d3b"></p>
    </form>
    <div id="result" class="result"></div>
    <div class="links">
      If your account is inactive or locked, use <a href="/">Forgot password</a> to restore access.<br>
      Don't have an account? <a href="/register">Sign up</a>
    </div>
  </div>

  <script>
    const API = '';
    const COOKIE_SESSION_MARKER = 'cookie-session';
    let csrfToken = '';

    async function ensureCsrfToken(forceRefresh = false) {
      if (csrfToken && !forceRefresh) return csrfToken;
      const res = await fetch(API + '/auth/csrf', { cache: 'no-store' });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.csrfToken) {
        throw new Error(data.error || 'Failed to initialize the security token. Refresh the page and try again.');
      }
      csrfToken = data.csrfToken;
      return csrfToken;
    }

    (async () => {
      try {
        await ensureCsrfToken();
      } catch (error) {
        const result = document.getElementById('result');
        result.className = 'result error';
        result.textContent = error.message;
      }
    })();

    function setAttemptsHint(message, tone = 'warning') {
      const hint = document.getElementById('attemptsHint');
      if (!message) {
        hint.textContent = '';
        hint.style.display = 'none';
        return;
      }
      hint.textContent = message;
      hint.style.display = 'block';
      hint.style.color = tone === 'error' ? '#b91c1c' : '#8a6d3b';
    }

    function buildRateLimitMessage(res, data, fallbackMessage) {
      const retryAfterFromHeader = Number(res?.headers?.get('Retry-After'));
      const retryAfterSeconds = Number.isFinite(data?.retryAfterSeconds) && data.retryAfterSeconds > 0
        ? data.retryAfterSeconds
        : Number.isFinite(retryAfterFromHeader) && retryAfterFromHeader > 0
          ? retryAfterFromHeader
          : 0;

      const baseMessage = String(data?.error || fallbackMessage || 'Too many requests. Please try again later.').trim();
      if (retryAfterSeconds < 1) {
        return baseMessage;
      }

      if (retryAfterSeconds >= 60) {
        const minutes = Math.floor(retryAfterSeconds / 60);
        const seconds = retryAfterSeconds % 60;
        const formatted = seconds > 0 ? `${minutes}m ${seconds}s` : `${minutes}m`;
        return `${baseMessage} Try again in ${formatted}.`;
      }

      return `${baseMessage} Try again in ${retryAfterSeconds}s.`;
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const result = document.getElementById('result');
      const email = document.getElementById('email').value.trim();
      btn.disabled = true;
      btn.textContent = 'Logging in...';
      result.className = 'result';
      result.style.display = 'none';

      try {
        const csrfValue = await ensureCsrfToken();
        const res = await fetch(API + '/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRF-Token': csrfValue,
          },
          body: JSON.stringify({
            email,
            password: document.getElementById('password').value,
          }),
        });

        const data = await res.json();
        if (!res.ok) {
          if (typeof data.remainingLoginAttempts === 'number') {
            setAttemptsHint(
              `Remaining failed login attempts before lock: ${data.remainingLoginAttempts}.`,
              data.accountLocked ? 'error' : 'warning',
            );
          } else {
            setAttemptsHint('');
          }

          if (res.status === 423 || data.accountLocked) {
            setAttemptsHint('Account locked. Use Forgot password on the main page to unlock it.', 'error');
          }
          if (res.status === 429) {
            const rateLimitMessage = buildRateLimitMessage(res, data, 'Too many login attempts. Please try again later.');
            setAttemptsHint(rateLimitMessage, 'warning');
            throw new Error(rateLimitMessage);
          }

          throw new Error(data.error || 'Login failed');
        }

        localStorage.setItem('token', COOKIE_SESSION_MARKER);
        localStorage.setItem('user', JSON.stringify(data.user));
        setAttemptsHint('');
        window.location.href = '/';
      } catch (error) {
        result.className = 'result error';
        result.textContent = error.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Log In';
      }
    });
  </script>
</body>
</html>
