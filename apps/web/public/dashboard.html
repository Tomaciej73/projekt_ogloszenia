<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — MultiPortal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 100vh; color: #fff; }
    .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }
    header { text-align: center; padding: 2rem 0; }
    header h1 { font-size: 2rem; background: linear-gradient(90deg, #e94560, #f39c12); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .panel { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 2rem; margin-bottom: 1.5rem; }
    .panel h2 { font-size: 1.2rem; margin-bottom: 1rem; color: #e94560; }
    .listings { max-height: 500px; overflow-y: auto; }
    .listing-card { padding: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .listing-card:last-child { border-bottom: none; }
    .listing-card h3 { font-size: 1.05rem; margin-bottom: 0.3rem; }
    .listing-card .meta { font-size: 0.85rem; color: rgba(255,255,255,0.5); margin-bottom: 0.75rem; }
    .providers { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .provider-btn { padding: 8px 18px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: #fff; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
    .provider-btn:hover { background: rgba(233,69,96,0.3); border-color: #e94560; }
    .provider-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .provider-btn.published { background: rgba(34,197,94,0.3); border-color: #22c55e; }
    button { padding: 12px 24px; background: linear-gradient(90deg, #e94560, #c23152); color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 0.9rem; }
    button:hover { transform: scale(1.02); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .secondary { background: rgba(255,255,255,0.1) !important; border: 1px solid rgba(255,255,255,0.2) !important; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 1rem; }
    .msg { padding: 1rem; border-radius: 10px; margin-bottom: 1rem; display: none; }
    .msg.show { display: block; }
    .msg.success { background: rgba(34,197,94,0.2); border: 1px solid rgba(34,197,94,0.4); color: #86efac; }
    .msg.error { background: rgba(220,38,38,0.2); border: 1px solid rgba(220,38,38,0.4); color: #fca5a5; }
    footer { text-align: center; padding: 2rem; color: rgba(255,255,255,0.3); font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Publish Listings</h1>
      <p style="color:rgba(255,255,255,0.5)">Select a listing and publish it to your connected marketplace platforms</p>
    </header>

    <div id="msg" class="msg"></div>

    <div class="panel">
      <div class="top-bar">
        <h2>📋 My Listings</h2>
        <div>
          <button class="secondary" id="refreshBtn">🔄 Refresh</button>
          <a href="/create-listing" style="text-decoration:none"><button style="margin-left:0.5rem">📝 New Listing</button></a>
          <a href="/" style="text-decoration:none"><button class="secondary" style="margin-left:0.5rem">🏠 Home</button></a>
        </div>
      </div>
      <div class="listings" id="listingsList">
        <p style="color:rgba(255,255,255,0.4);padding:1rem">Loading...</p>
      </div>
    </div>
  </div>
  <footer>MultiPortal Listing Manager · BullMQ Worker Active</footer>

  <script>
    const API = '';
    const COOKIE_SESSION_MARKER = 'cookie-session';
    let token = localStorage.getItem('token') || '';
    let csrfToken = '';

    function getAuthHeaders(extraHeaders = {}) {
      const jwtLike = /^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+$/.test(token);
      return jwtLike ? { ...extraHeaders, Authorization: 'Bearer ' + token } : extraHeaders;
    }

    async function ensureCsrfToken(forceRefresh = false) {
      if (csrfToken && !forceRefresh) return csrfToken;
      const res = await fetch(API + '/auth/csrf', { cache: 'no-store' });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.csrfToken) {
        throw new Error(data.error || 'Failed to initialize the security token. Refresh the page and try again.');
      }
      csrfToken = data.csrfToken;
      return csrfToken;
    }

    async function apiFetch(path, options = {}, { auth = false } = {}) {
      const method = String(options.method || 'GET').toUpperCase();
      let headers = { ...(options.headers || {}) };

      if (!['GET', 'HEAD', 'OPTIONS'].includes(method)) {
        headers['X-CSRF-Token'] = await ensureCsrfToken();
      }

      if (auth) {
        headers = getAuthHeaders(headers);
      }

      return fetch(API + path, { ...options, headers });
    }

    document.getElementById('refreshBtn').addEventListener('click', () => loadData());

    (async () => {
      try {
        const res = await fetch(API + '/auth/me');
        if (!res.ok) throw new Error('Not authenticated');
        const data = await res.json();
        token = token || COOKIE_SESSION_MARKER;
        localStorage.setItem('token', COOKIE_SESSION_MARKER);
        localStorage.setItem('user', JSON.stringify(data.user));
        await ensureCsrfToken();
        loadData();
      } catch {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        document.getElementById('listingsList').innerHTML = '<p style="color:#fca5a5;padding:2rem;text-align:center">Please <a href="/" style="color:#e94560">log in</a> first.</p>';
      }
    })();

    function showMsg(text, type) {
      const m = document.getElementById('msg');
      m.textContent = text;
      m.className = 'msg show ' + type;
      setTimeout(() => m.className = 'msg', 4000);
    }

    async function loadData() {
      try {
        const [listingsRes, providersRes, accountsRes] = await Promise.all([
          fetch(API + '/listings', { headers: getAuthHeaders() }),
          fetch(API + '/providers'),
          fetch(API + '/marketplace-accounts', { headers: getAuthHeaders() }),
        ]);

        const listingsData = await listingsRes.json();
        const providersData = await providersRes.json();
        const accountsData = await accountsRes.json();

        const connectedProviders = new Set((accountsData.accounts || []).map(a => a.marketplaceProvider.slug));

        const list = document.getElementById('listingsList');
        if (!listingsData.listings || listingsData.listings.length === 0) {
          list.innerHTML = '<p style="color:rgba(255,255,255,0.4);padding:1rem">No listings yet. <a href="/create-listing" style="color:#e94560">Create your first one.</a></p>';
          return;
        }

        list.innerHTML = listingsData.listings.map(l => `
          <div class="listing-card">
            <h3>${escapeHtml(l.title)}</h3>
            <div class="meta">${Number(l.price).toFixed(2)} PLN · ${l.category} · ${l.status} · ${new Date(l.createdAt).toLocaleDateString()}</div>
            <div class="providers">
              ${(providersData.providers || []).map(p => {
                const connected = connectedProviders.has(p.slug);
                return `<button class="provider-btn publish-btn"
                  data-listing-id="${l.id}"
                  data-provider-slug="${p.slug}"
                  ${!connected ? 'disabled title="Connect this provider first"' : ''}>
                  ${p.displayName || p.name}
                  ${!connected ? ' (not connected)' : ''}
                </button>`;
              }).join('')}
            </div>
          </div>
        `).join('');

        list.querySelectorAll('.publish-btn').forEach((button) => {
          button.addEventListener('click', () => publishListing(button.dataset.listingId, button.dataset.providerSlug, button));
        });
      } catch (e) {
        showMsg('Failed to load data: ' + e.message, 'error');
      }
    }

    async function publishListing(listingId, providerSlug, btn) {
      btn.disabled = true;
      btn.textContent = 'Publishing...';

      try {
        // First connect the account if not already connected
        await apiFetch('/marketplace-accounts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ providerSlug }),
        }, { auth: true });

        // Create publication job
        const res = await apiFetch('/publication-jobs', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ listingId }),
        }, { auth: true });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Publication failed');

        showMsg(`Published to ${providerSlug}! Job ID: ${data.job.id} (queue: bullmq)`, 'success');
        btn.classList.add('published');
        btn.textContent = `${providerSlug} ✓`;
      } catch (e) {
        showMsg('Error: ' + e.message, 'error');
        btn.disabled = false;
        btn.textContent = providerSlug;
      }
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }
  </script>
</body>
</html>
