<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — MultiPortal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: white; border-radius: 12px; padding: 2rem; width: 100%; max-width: 420px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .card h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #1a1a2e; }
    .card p { color: #666; margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.3rem; font-weight: 600; font-size: 0.9rem; }
    input { width: 100%; padding: 10px; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
    button { width: 100%; padding: 14px; background: #e94560; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; }
    button:hover { background: #c23152; }
    button:disabled { background: #999; cursor: not-allowed; }
    .result { margin-top: 1rem; padding: 1rem; border-radius: 8px; display: none; }
    .result.success { display: block; background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .result.error { display: block; background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .links { text-align: center; margin-top: 1rem; }
    .links a { color: #e94560; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Create Account</h1>
    <p>Sign up to start managing your marketplace listings</p>
    <form id="registerForm">
      <label>Full Name</label>
      <input type="text" id="name" required placeholder="Your name" autocomplete="name">
      <label>Email</label>
      <input type="email" id="email" required placeholder="you@example.com" autocomplete="email">
      <label>Password</label>
      <input type="password" id="password" required minlength="15" maxlength="256" title="Use a unique passphrase with at least 15 characters." placeholder="Unique passphrase (min 15 chars)" autocomplete="new-password">
      <p style="color:#666;margin:-0.5rem 0 1rem;font-size:0.85rem">Use a unique passphrase of at least 15 characters. Known breached passwords are blocked.</p>
      <p style="color:#666;margin:-0.5rem 0 1rem;font-size:0.85rem">After registration, activate your account using the email link we send you.</p>
      <button type="submit" id="submitBtn">Create Account</button>
    </form>
    <div id="result" class="result"></div>
    <div class="links">
      Already have an account? <a href="/login">Log in</a>
    </div>
  </div>

  <script>
    const API = '';
    let csrfToken = '';

    async function ensureCsrfToken(forceRefresh = false) {
      if (csrfToken && !forceRefresh) return csrfToken;
      const res = await fetch(API + '/auth/csrf', { cache: 'no-store' });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.csrfToken) {
        throw new Error(data.error || 'Failed to initialize the security token. Refresh the page and try again.');
      }
      csrfToken = data.csrfToken;
      return csrfToken;
    }

    (async () => {
      try {
        await ensureCsrfToken();
      } catch (error) {
        const result = document.getElementById('result');
        result.className = 'result error';
        result.textContent = error.message;
      }
    })();

    function validatePasswordStrength(password) {
      if (!password || password.length < 15) return 'Password must be at least 15 characters.';
      if (password.length > 256) return 'Password is too long (max 256 characters).';
      if (password.includes('\u0000')) return 'Password contains an unsupported character.';
      return null;
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const result = document.getElementById('result');
      const password = document.getElementById('password').value;
      const passwordError = validatePasswordStrength(password);
      if (passwordError) {
        result.className = 'result error';
        result.textContent = passwordError;
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Creating...';
      result.className = 'result';
      result.style.display = 'none';

      try {
        const csrfValue = await ensureCsrfToken();
        const res = await fetch(API + '/auth/register', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRF-Token': csrfValue,
          },
          body: JSON.stringify({
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            password,
          }),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Registration failed');

        result.className = data.activationEmailSent === false ? 'result error' : 'result success';
        result.textContent = data.message || 'Account created. Check your email to activate your account.';
        document.getElementById('name').value = '';
        document.getElementById('email').value = '';
        document.getElementById('password').value = '';
      } catch (error) {
        result.className = 'result error';
        result.textContent = error.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
