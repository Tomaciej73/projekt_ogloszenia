# MultiPortal Listing Manager — Local Development Services
# All configurable values come from .env (git-ignored).
# Copy .env.example to .env and adjust as needed.
# See memory-bank/techContext.md for the version verification policy.

name: multiportal

services:
  # ── Infrastructure ──
  postgres:
    container_name: multiportal-postgres
    image: ${POSTGRES_IMAGE}
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    container_name: multiportal-redis
    image: ${REDIS_IMAGE}
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    container_name: multiportal-minio
    image: ${MINIO_IMAGE}
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Application Servers ──
  api:
    container_name: multiportal-api
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    restart: unless-stopped
    ports:
      - "${API_PORT}:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      NODE_ENV: ${NODE_ENV}
      LOG_LEVEL: ${LOG_LEVEL}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:${MINIO_API_PORT}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE}
      JWT_SECRET: ${JWT_SECRET}
      MINIO_API_PORT: ${MINIO_API_PORT}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    container_name: multiportal-worker
    build:
      context: .
      dockerfile: apps/worker/Dockerfile.dev
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      NODE_ENV: ${NODE_ENV}
      LOG_LEVEL: ${LOG_LEVEL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    container_name: multiportal-web
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    restart: unless-stopped
    ports:
      - "${WEB_PORT}:3000"
    environment:
      NODE_ENV: ${NODE_ENV}
    depends_on:
      - api

volumes:
  postgres_data:
    name: multiportal_postgres_data
  redis_data:
    name: multiportal_redis_data
  minio_data:
    name: multiportal_minio_data